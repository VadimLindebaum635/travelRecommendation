<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Travel Recommendation</title>
	<style>
		body { margin:0; font-family: Arial, sans-serif; }
		.navbar { display:flex; align-items:center; justify-content:space-between; background:#036; color:#fff; padding:10px 16px; }
		.nav-links a { color:#fff; text-decoration:none; margin:0 8px; }
		.search-form { display:flex; gap:8px; align-items:center; }
		.search-input { padding:6px; border-radius:4px; border:1px solid #ccc; }
		.btn { padding:6px 10px; border:none; border-radius:4px; cursor:pointer; }
		.btn-search { background:#fff; color:#036; }
		.btn-reset { background:#f2f2f2; color:#333; }

		/* Home hero styles */
		.hero { height:60vh; background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1600&auto=format&fit=crop&ixlib=rb-4.0.3&s='); background-size:cover; background-position:center; display:flex; align-items:center; color:#fff; }
		.hero-overlay { width:100%; background:linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)); }
		.hero-content { max-width:1100px; margin:0 auto; padding:40px; }
		.hero h1 { margin:0 0 12px 0; font-size:2.2rem; }
		.intro { font-size:1.05rem; margin-bottom:16px; max-width:700px; }
		.social a { margin-right:10px; display:inline-block; width:36px; height:36px; background:rgba(255,255,255,0.15); border-radius:50%; color:#fff; text-align:center; line-height:36px; text-decoration:none; }
		#results { padding:20px; }
		.result-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:16px; }
		.result-card { background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
		.result-card img { width:100%; height:160px; object-fit:cover; display:block; }
		.card-body { padding:12px; }
		.card-body h3 { margin:0 0 8px 0; font-size:1.05rem; }
		.card-body p { margin:0; color:#555; font-size:0.95rem; }
		.local-time { margin-top:8px; font-size:0.9rem; color:#333; }
	</style>
</head>
<body>
	<nav class="navbar">
		<div class="brand">
			<a href="travel_recommendation.html" style="color:#fff; text-decoration:none; font-weight:bold; margin-right:12px;">Travel Recommendation</a>
		</div>
		<div class="nav-links">
			<a href="travel_recommendation.html">Home</a>
			<a href="about_us.html">About Us</a>
			<a href="contact_us.html">Contact Us</a>
		</div>
		<div class="search-form">
			<input id="searchInput" class="search-input" type="search" placeholder="Search recommendations..." />
			<button id="searchBtn" class="btn btn-search" type="button">Search</button>
			<button id="resetBtn" class="btn btn-reset" type="button">Reset</button>
			<button id="clearBtn" class="btn btn-reset" type="button">Clear</button>
		</div>
	</nav>

	<main>
		<section class="hero">
			<div class="hero-overlay">
				<div class="hero-content">
					<h1>Welcome to Travel Recommendation</h1>
					<p class="intro">Discover personalized travel recommendations, curated destinations, and tips to plan your next adventure. Use the search above to find ideas tailored to your interests.</p>
					<div class="social" aria-label="Social links">
						<a href="#" title="Facebook" aria-label="Facebook">f</a>
						<a href="#" title="Twitter" aria-label="Twitter">t</a>
						<a href="#" title="Instagram" aria-label="Instagram">in</a>
					</div>
				</div>
			</div>
		</section>

		<section id="results" aria-live="polite"></section>
	</main>

	<script src="travel_recommendation.js"></script>
</body>
</html>
